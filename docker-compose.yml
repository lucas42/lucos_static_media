services:
    static_media:
      build: .
      container_name: lucos_static_media
      ports: 
        - $PORT:80
      volumes:
        - "public:/usr/local/apache2/htdocs/"
      image: lucas42/lucos_static_media:${VERSION:-latest}
      restart: always
      healthcheck:
        test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
        interval: 10s
        timeout: 5s
        retries: 3
        start_period: 15s

volumes:
  public:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=aurora.local,rw,nolock,hard,nointr,nfsvers=3"
      device: ":/medlib/public"